  description: API interna de pagamentos
spec:
  type: openapi
  lifecycle: production
  owner: team-platform
  system: ecommerce
  definition: |
    openapi: "3.0.0"
    info:
      title: Payments API
      version: 1.0.0
    paths:
      /payments:
        post:
          summary: Processar pagamento
          responses:
            "200":
              description: OK
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: inventory-api
  description: API interna de inventário
spec:
  type: openapi
  lifecycle: production
  owner: team-platform
  system: ecommerce
  definition: |
    openapi: "3.0.0"
    info:
      title: Inventory API
      version: 1.0.0
    paths:
      /inventory:
        get:
          summary: Consultar estoque
          responses:
            "200":
              description: OK
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: analytics-api
  description: API de analytics e relatórios
spec:
  type: openapi
  lifecycle: beta
  owner: team-data
  system: data-platform
  definition: |
    openapi: "3.0.0"
    info:
      title: Analytics API
      version: 0.1.0
    paths:
      /reports/sales:
        get:
          summary: Relatório de vendas
          responses:
            "200":
              description: OK
