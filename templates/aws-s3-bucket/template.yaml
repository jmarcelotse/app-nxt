apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: aws-s3-bucket
  title: AWS S3 Bucket
  description: Cria um bucket S3 na AWS usando Terraform com profile staging
  tags:
    - aws
    - s3
    - terraform
spec:
  owner: team-platform
  type: resource

  parameters:
    - title: Configuração do Bucket
      required:
        - name
        - description
        - owner
        - region
      properties:
        name:
          title: Nome do bucket
          type: string
          description: Nome único do bucket S3 (ex. my-app-data)
          pattern: '^[a-z0-9][a-z0-9.-]+[a-z0-9]$'
          ui:autofocus: true
        description:
          title: Descrição
          type: string
        owner:
          title: Owner
          type: string
          ui:field: OwnerPicker
          ui:options:
            catalogFilter:
              kind: Group
        region:
          title: Região AWS
          type: string
          default: us-east-1
          enum:
            - us-east-1
            - us-east-2
            - us-west-2
            - sa-east-1
          enumNames:
            - US East (N. Virginia)
            - US East (Ohio)
            - US West (Oregon)
            - South America (São Paulo)
        versioning:
          title: Habilitar versionamento
          type: boolean
          default: true
        encryption:
          title: Habilitar criptografia (SSE-S3)
          type: boolean
          default: true

    - title: Repositório
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Localização do repositório
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

  steps:
    - id: fetch
      name: Gerar código Terraform
      action: fetch:template
      input:
        url: ./content
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          region: ${{ parameters.region }}
          versioning: ${{ parameters.versioning }}
          encryption: ${{ parameters.encryption }}

    - id: publish
      name: Publicar no GitHub
      action: publish:github
      input:
        repoUrl: ${{ parameters.repoUrl }}
        description: "Terraform - S3 Bucket: ${{ parameters.name }}"
        repoVisibility: public
        defaultBranch: main

    - id: register
      name: Registrar no catálogo
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repositório
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Abrir no catálogo
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
